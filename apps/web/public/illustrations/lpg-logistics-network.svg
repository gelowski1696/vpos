<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="60" y1="40" x2="1140" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070707"/>
      <stop offset="0.5" stop-color="#140F08"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="lineGold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F3D189"/>
      <stop offset="1" stop-color="#B48639"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="1160" height="680" rx="34" fill="url(#bg2)"/>
  <rect x="20" y="20" width="1160" height="680" rx="34" stroke="#D8B067" stroke-opacity="0.35"/>

